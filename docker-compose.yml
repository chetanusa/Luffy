version: '3.8'
services:
  neo4j:
    image: neo4j:latest
    container_name: mindweave-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/mindweave123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
  postgres:
    image: postgres:15
    container_name: mindweave-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mindweave
      POSTGRES_USER: mindweave_user
      POSTGRES_PASSWORD: mindweave123
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data: